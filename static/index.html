<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b2a44" />
<title>Seat Scout · unreserved-ticket companion for PKP IC</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
<link rel="apple-touch-icon" href="/static/favicon.svg" />
<meta name="apple-mobile-web-app-title" content="Seat Scout" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap"
  rel="stylesheet"
/>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Inter', 'ui-sans-serif', 'system-ui'],
          mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
        },
        colors: {
          rail: {
            ink:    '#0b2a44',
            deep:   '#0a1f33',
            line:   '#1b4a73',
            cream:  '#f6f2ea',
            paper:  '#fbf8f2',
            rust:   '#b4471f',
            amber:  '#d8973c',
            moss:   '#2b5f3d',
          },
        },
        boxShadow: {
          ticket: '0 1px 0 rgba(11,42,68,.05), 0 10px 24px -12px rgba(11,42,68,.25)',
          pop:    '0 20px 50px -20px rgba(11,42,68,.35)',
          pick:   '0 14px 34px -18px rgba(11,42,68,.45)',
        },
      },
    },
  };
</script>
<style>
  html, body { background: #f6f2ea; }
  body {
    font-family: 'Inter', ui-sans-serif, system-ui;
    color: #0a1f33;
    font-feature-settings: "ss01", "cv11";
    -webkit-font-smoothing: antialiased;
    min-height: 100svh;
    background-color: #f6f2ea;
    background-image:
      radial-gradient(rgba(11,42,68,.045) 1px, transparent 1px),
      radial-gradient(rgba(11,42,68,.03) 1px, transparent 1px);
    background-size: 3px 3px, 11px 11px;
    background-position: 0 0, 1px 2px;
  }
  .num, .tab { font-variant-numeric: tabular-nums; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }

  .rule-rail { position: relative; height: 1px; background: #0b2a44; opacity: .18; }

  .carriage-rail {
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(to bottom, rgba(11,42,68,.9), rgba(11,42,68,.25));
    border-radius: 2px;
  }

  .bar-track { background: rgba(11,42,68,.08); border-radius: 999px; overflow: hidden; }
  .bar-fill  { height: 100%; border-radius: 999px; transition: width .8s cubic-bezier(.2,.8,.2,1); }

  .card { transition: transform .18s ease, box-shadow .18s ease; }
  .card:hover { transform: translateY(-1px); }

  @keyframes rise {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .rise { animation: rise .55s cubic-bezier(.2,.8,.2,1) both; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .wheel {
    width: 44px; height: 44px; border-radius: 999px;
    border: 3px solid rgba(11,42,68,.12);
    border-top-color: #0b2a44;
    animation: spin 1.1s linear infinite;
  }

  @keyframes pulse { 0%,80%,100% { opacity: .25; } 40% { opacity: 1; } }
  .pd > span { display: inline-block; width: 4px; height: 4px; margin: 0 1px;
               background: currentColor; border-radius: 999px; animation: pulse 1.2s infinite; }
  .pd > span:nth-child(2) { animation-delay: .15s; }
  .pd > span:nth-child(3) { animation-delay: .3s; }

  input:focus, button:focus-visible { outline: 2px solid #0b2a44; outline-offset: 2px; }

  .label {
    text-transform: uppercase;
    letter-spacing: .14em;
    font-size: 10.5px;
    font-weight: 700;
    color: rgba(11,42,68,.55);
  }

  .track {
    height: 2px;
    background: repeating-linear-gradient(90deg, #0b2a44 0 6px, transparent 6px 12px);
    opacity: .35;
  }

  .step {
    width: 22px; height: 22px; border-radius: 999px;
    background: #0b2a44; color: #f6f2ea;
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 11px; font-family: 'JetBrains Mono', ui-monospace, monospace;
    flex-shrink: 0;
  }

  @media (max-width: 360px) { .tight-pad { padding-left: 14px; padding-right: 14px; } }

  /* Combobox */
  .combo { position: relative; }
  .combo[aria-expanded="true"] .combo-list { display: block; }
  .combo-list {
    display: none;
    position: absolute;
    top: calc(100% + 6px); left: 0; right: 0; z-index: 20;
    max-height: 280px; overflow-y: auto;
    background: #fff;
    border: 1px solid rgba(11,42,68,.14);
    border-radius: 14px;
    box-shadow: 0 14px 34px -18px rgba(11,42,68,.45);
    -webkit-overflow-scrolling: touch;
  }
  .combo-item {
    padding: 11px 14px;
    font-size: 14.5px; font-weight: 500;
    color: #0a1f33;
    cursor: pointer;
    display: flex; align-items: center; gap: 10px;
    border-top: 1px solid rgba(11,42,68,.06);
  }
  .combo-item:first-child { border-top: none; }
  .combo-item[aria-selected="true"], .combo-item:hover { background: #f6f2ea; }
  .combo-item .tag {
    font-size: 10.5px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    color: rgba(11,42,68,.45);
    margin-left: auto;
  }
  .combo-empty { padding: 14px; font-size: 13px; color: rgba(11,42,68,.55); text-align: center; }
  .swap-btn {
    border: 1px solid rgba(11,42,68,.15);
    background: #fff; color: #0b2a44;
    border-radius: 999px;
    width: 30px; height: 30px;
    display: inline-flex; align-items: center; justify-content: center;
    transition: transform .25s cubic-bezier(.2,.8,.2,1), background .2s;
  }
  .swap-btn:hover { background: #f6f2ea; transform: rotate(180deg); }

  /* View machinery */
  .view { display: none; }
  .view.is-active { display: block; }

  /* Stop-picker list */
  .stop-row {
    display: grid;
    grid-template-columns: 52px 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 8px 0 8px 2px;
    position: relative;
    cursor: pointer;
  }
  .stop-row + .stop-row { border-top: 1px dashed rgba(11,42,68,.12); }
  .stop-row .dot {
    width: 12px; height: 12px; border-radius: 999px;
    background: #fff;
    border: 2px solid rgba(11,42,68,.35);
    margin-left: 10px; position: relative; z-index: 1;
  }
  .stop-row .line {
    position: absolute;
    left: 15px; top: 0; bottom: 0; width: 2px;
    background: rgba(11,42,68,.15);
  }
  .stop-row:first-child .line { top: 50%; }
  .stop-row:last-child  .line { bottom: 50%; }
  .stop-row.is-start .dot { background: #2b5f3d; border-color: #2b5f3d; box-shadow: 0 0 0 4px rgba(43,95,61,.15); }
  .stop-row.is-end   .dot { background: #b4471f; border-color: #b4471f; box-shadow: 0 0 0 4px rgba(180,71,31,.15); }
  .stop-row.is-between .dot { background: #0b2a44; border-color: #0b2a44; }
  .stop-row.is-locked { cursor: default; }
  .stop-row.is-locked .dot::after {
    content: ""; position: absolute; inset: -6px; border-radius: 999px;
    border: 1px dashed rgba(11,42,68,.35); pointer-events: none;
  }
  .stop-row.is-between .line { background: #0b2a44; }
  .stop-row.is-start ~ .stop-row:not(.is-end):not(.is-between) .line { background: rgba(11,42,68,.15); }
  .stop-row .times {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-variant-numeric: tabular-nums;
    font-size: 12.5px; color: rgba(11,42,68,.7);
    white-space: nowrap;
  }
  .stop-row .name { font-weight: 600; font-size: 14.5px; }
  .stop-row .pill {
    font-size: 9.5px; letter-spacing: .12em; text-transform: uppercase;
    font-weight: 800; padding: 2px 6px; border-radius: 999px;
  }
  .stop-row.is-start .pill { background: #2b5f3d; color: #f6f2ea; }
  .stop-row.is-end   .pill { background: #b4471f; color: #f6f2ea; }

  .breadcrumb {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
    color: rgba(11,42,68,.5); font-weight: 700;
    flex-wrap: wrap;
  }
  .breadcrumb .crumb {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 8px 4px 4px;
    border-radius: 999px;
    transition: background .15s, color .15s;
    cursor: pointer;
    background: transparent;
    border: none;
    color: inherit;
    font: inherit;
    letter-spacing: inherit;
    text-transform: inherit;
  }
  .breadcrumb .crumb:hover:not(.is-locked) { background: rgba(11,42,68,.06); }
  .breadcrumb .crumb.is-locked { cursor: default; opacity: .55; }
  .breadcrumb .crumb.is-current { color: #0b2a44; }
  .breadcrumb .node {
    width: 18px; height: 18px; border-radius: 999px;
    background: rgba(11,42,68,.08); color: rgba(11,42,68,.55);
    display: inline-flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 10px;
    transition: background .2s, color .2s;
  }
  .crumb.is-current .node { background: #0b2a44; color: #f6f2ea; }
  .crumb.is-done    .node { background: #2b5f3d; color: #f6f2ea; }

  /* Soon-to-be-free seats get a distinct amber treatment */
  .seat-soon { background: rgba(216,151,60,.07); border-left: 3px solid #d8973c; padding-left: 12px; margin-left: -12px; }
  .free-soon-header {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
    font-weight: 800; color: #8a5a10;
    padding: 6px 2px 4px;
  }
</style>
</head>
<body class="antialiased">
  <main class="mx-auto max-w-[560px] tight-pad px-5 pb-24 pt-8 sm:pt-12">

    <!-- Masthead -->
    <header class="mb-6">
      <div class="flex items-center gap-3">
        <svg width="34" height="34" viewBox="0 0 34 34" aria-hidden="true" class="-ml-0.5">
          <circle cx="17" cy="17" r="16" fill="#0b2a44"/>
          <rect x="9" y="11" width="16" height="12" rx="3" fill="none" stroke="#f6f2ea" stroke-width="1.6"/>
          <line x1="17" y1="11" x2="17" y2="23" stroke="#f6f2ea" stroke-width="1.6"/>
          <circle cx="12" cy="27" r="1.4" fill="#f6f2ea"/>
          <circle cx="22" cy="27" r="1.4" fill="#f6f2ea"/>
        </svg>
        <div class="flex-1">
          <div class="flex items-baseline gap-2">
            <h1 class="text-[22px] font-black tracking-tight leading-none">Seat Scout</h1>
            <span class="label hidden sm:inline">for tickets without a seat reservation</span>
          </div>
          <p class="mt-1 text-[13px] text-rail-line/80">
            Find your train, pick the leg, see seats that stay free longest.
          </p>
        </div>
      </div>
      <nav class="breadcrumb mt-4" aria-label="Steps">
        <button type="button" class="crumb is-current" data-crumb="1">
          <span class="node">1</span><span>Train</span>
        </button>
        <span class="opacity-30" aria-hidden="true">→</span>
        <button type="button" class="crumb is-locked" data-crumb="2">
          <span class="node">2</span><span>Leg</span>
        </button>
        <span class="opacity-30" aria-hidden="true">→</span>
        <button type="button" class="crumb is-locked" data-crumb="3">
          <span class="node">3</span><span>Seats</span>
        </button>
      </nav>
    </header>

    <!-- VIEW 1 — search journeys -->
    <section id="view-1" class="view is-active">
      <section class="card rounded-3xl bg-rail-paper p-5 shadow-ticket ring-1 ring-rail-ink/5">
        <h2 class="label mb-3">Find your train</h2>
        <form id="search-form" class="space-y-4" autocomplete="off" novalidate>
          <div class="space-y-1 combo" data-combo="from">
            <label class="label block" for="from">From</label>
            <div class="relative">
              <input id="from" name="from" type="text" placeholder="e.g. Kraków Główny" autocomplete="off" role="combobox" aria-autocomplete="list" aria-expanded="false" aria-controls="from-list"
                class="w-full rounded-xl border border-rail-ink/15 bg-white px-4 py-3 pr-10 text-[15px] font-medium placeholder:text-rail-ink/30" />
              <svg class="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-rail-ink/40" width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="6" fill="none" stroke="currentColor" stroke-width="2"/>
                <path d="M20 20l-4.2-4.2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </div>
            <ul id="from-list" role="listbox" class="combo-list"></ul>
          </div>

          <div class="flex justify-center -my-1">
            <button type="button" id="swap" class="swap-btn" title="Swap stations" aria-label="Swap stations">
              <svg width="14" height="14" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M7 4v12M7 16l-3-3m3 3l3-3M17 20V8M17 8l-3 3m3-3l3 3"
                      fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>

          <div class="space-y-1 combo" data-combo="to">
            <label class="label block" for="to">To</label>
            <div class="relative">
              <input id="to" name="to" type="text" placeholder="e.g. Warszawa Centralna" autocomplete="off" role="combobox" aria-autocomplete="list" aria-expanded="false" aria-controls="to-list"
                class="w-full rounded-xl border border-rail-ink/15 bg-white px-4 py-3 pr-10 text-[15px] font-medium placeholder:text-rail-ink/30" />
              <svg class="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-rail-ink/40" width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="6" fill="none" stroke="currentColor" stroke-width="2"/>
                <path d="M20 20l-4.2-4.2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </div>
            <ul id="to-list" role="listbox" class="combo-list"></ul>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div class="space-y-1">
              <label class="label block" for="date">Date</label>
              <input id="date" name="date" type="date" required
                class="w-full rounded-xl border border-rail-ink/15 bg-white px-3 py-3 text-[15px] font-medium mono" />
            </div>
            <div class="space-y-1">
              <label class="label block" for="time">Time <span class="opacity-60 font-normal normal-case tracking-normal">(optional)</span></label>
              <input id="time" name="time" type="time"
                class="w-full rounded-xl border border-rail-ink/15 bg-white px-3 py-3 text-[15px] font-medium mono" />
            </div>
          </div>

          <div class="space-y-1">
            <label class="label block" for="number">Train number or name <span class="opacity-60 font-normal normal-case tracking-normal">(optional)</span></label>
            <input id="number" name="number" type="text" placeholder="e.g. 3806 or Zefir"
              class="w-full rounded-xl border border-rail-ink/15 bg-white px-4 py-3 text-[15px] font-medium placeholder:text-rail-ink/30" />
          </div>

          <button type="submit"
            class="mt-2 inline-flex w-full items-center justify-center gap-2 rounded-xl bg-rail-ink px-5 py-3.5 text-[15px] font-bold tracking-wide text-rail-cream shadow-pop hover:bg-rail-deep active:translate-y-px">
            <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
              <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M4 12l6 6L20 6"/>
            </svg>
            Find train
          </button>

          <p class="text-[11.5px] text-rail-ink/50 leading-snug">
            Fill in what you know — more fields, tighter results. IC · TLK · EIC · EIP only.
          </p>
        </form>
      </section>
    </section>

    <!-- VIEW 2 — journey list -->
    <section id="view-2" class="view">
      <div class="mb-3 flex items-center justify-between">
        <button type="button" data-back="1" class="inline-flex items-center gap-1.5 text-[13px] font-semibold text-rail-line hover:text-rail-ink">
          <svg width="14" height="14" viewBox="0 0 24 24" aria-hidden="true"><path d="M15 6l-6 6 6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Change search
        </button>
        <span class="label" id="journey-count"></span>
      </div>
      <div id="journey-list" class="space-y-3"></div>
    </section>

    <!-- VIEW 3 — route picker -->
    <section id="view-3" class="view">
      <div class="mb-3 flex items-center justify-between">
        <button type="button" data-back="2" class="inline-flex items-center gap-1.5 text-[13px] font-semibold text-rail-line hover:text-rail-ink">
          <svg width="14" height="14" viewBox="0 0 24 24" aria-hidden="true"><path d="M15 6l-6 6 6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Different train
        </button>
        <span class="label">Pick your leg</span>
      </div>
      <div id="train-header"></div>
      <div class="mt-3 rounded-3xl bg-rail-paper p-4 shadow-ticket ring-1 ring-rail-ink/5">
        <p id="picker-hint" class="label mb-2"></p>
        <div id="stop-list"></div>
      </div>
      <div id="leg-summary" class="mt-3 hidden rounded-2xl bg-white p-4 ring-1 ring-rail-ink/10"></div>
      <button id="go-seats" type="button" disabled
        class="mt-4 inline-flex w-full items-center justify-center gap-2 rounded-xl bg-rail-ink px-5 py-3.5 text-[15px] font-bold tracking-wide text-rail-cream shadow-pop hover:bg-rail-deep active:translate-y-px disabled:opacity-40 disabled:cursor-not-allowed">
        <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 12l18 0M14 5l7 7-7 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Find seats
      </button>
    </section>

    <!-- VIEW 4 — seat recommendations -->
    <section id="view-4" class="view">
      <div class="mb-3 flex items-center justify-between">
        <button type="button" data-back="3" class="inline-flex items-center gap-1.5 text-[13px] font-semibold text-rail-line hover:text-rail-ink">
          <svg width="14" height="14" viewBox="0 0 24 24" aria-hidden="true"><path d="M15 6l-6 6 6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Change leg
        </button>
        <button type="button" data-back="1" class="text-[13px] font-semibold text-rail-line hover:text-rail-ink">
          New search
        </button>
      </div>
      <div id="seats-body"></div>
    </section>

    <section id="live" class="mt-4" aria-live="polite" aria-busy="false"></section>
  </main>

<template id="tpl-loading">
  <div class="rise rounded-3xl bg-rail-paper p-6 shadow-ticket ring-1 ring-rail-ink/5">
    <div class="flex items-center gap-4">
      <div class="wheel" aria-hidden="true"></div>
      <div class="flex-1">
        <div class="font-bold text-[15px]" data-slot="title">Chwila…</div>
        <div class="mt-0.5 text-[12.5px] text-rail-ink/60" data-slot="hint">
          <span class="pd text-rail-ink/60"><span></span><span></span><span></span></span>
        </div>
      </div>
    </div>
  </div>
</template>

<template id="tpl-error">
  <div class="rise rounded-3xl bg-white p-5 shadow-ticket ring-1 ring-rail-rust/30">
    <div class="flex items-start gap-3">
      <svg width="22" height="22" viewBox="0 0 24 24" class="mt-0.5 shrink-0 text-rail-rust" aria-hidden="true">
        <path fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
              d="M12 3l10 17H2L12 3zM12 10v4.5M12 17.6h.01"/>
      </svg>
      <div class="flex-1">
        <div class="label text-rail-rust" data-slot="heading">Error</div>
        <p class="mt-1 text-[14.5px] font-semibold" data-slot="message"></p>
        <p class="mt-2 text-[12.5px] text-rail-ink/60" data-slot="hint"></p>
      </div>
    </div>
  </div>
</template>

<script>
(() => {
  // ===================== Utilities =====================
  const $ = (s, r=document) => r.querySelector(s);
  const $$ = (s, r=document) => [...r.querySelectorAll(s)];
  const live = $('#live');
  const tplLoading = $('#tpl-loading');
  const tplError = $('#tpl-error');

  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, (c) => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }
  function highlight(text, q) {
    const t = escapeHtml(text);
    if (!q) return t;
    const safeQ = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return t.replace(new RegExp(`(${safeQ})`, 'ig'), '<strong>$1</strong>');
  }
  function durationLabel(min) {
    if (min == null) return '';
    const h = Math.floor(min / 60), m = min % 60;
    if (h === 0) return `${m} min`;
    if (m === 0) return `${h} h`;
    return `${h} h ${String(m).padStart(2, '0')} min`;
  }

  // ===================== View router =====================
  const state = {
    step: 1,
    date: null,
    journeys: [],
    selectedJourney: null,
    trainStops: null,
    displayRange: null,   // [fromIdx, toIdx] into trainStops.stops for step 3
    startIndex: null,
    endIndex: null,
    lockStart: false,     // true when user provided `from` at search time
    lockEnd: false,       // true when user provided `to` at search time
    lastSeats: null,      // cached for round-tripping back to step 4
  };

  // View ↔ Crumb mapping. 3 crumbs cover 4 views:
  //   crumb 1 = views 1/2 (search + journey list)
  //   crumb 2 = view 3 (odcinek)
  //   crumb 3 = view 4 (miejsca)
  function viewToCrumb(n) { return n <= 2 ? 1 : (n === 3 ? 2 : 3); }
  function crumbReachable(c) {
    if (c === 1) return true;
    if (c === 2) return !!state.trainStops;
    if (c === 3) return !!state.lastSeats;
    return false;
  }
  function crumbTargetView(c) {
    if (c === 1) return state.journeys.length ? 2 : 1;
    if (c === 2) return 3;
    if (c === 3) return 4;
    return 1;
  }

  function updateBreadcrumb(n) {
    const current = viewToCrumb(n);
    $$('.breadcrumb .crumb').forEach(btn => {
      const c = parseInt(btn.dataset.crumb, 10);
      btn.classList.remove('is-current', 'is-done', 'is-locked');
      if (c < current) btn.classList.add('is-done');
      else if (c === current) btn.classList.add('is-current');
      if (!crumbReachable(c) && c !== current) btn.classList.add('is-locked');
    });
  }

  function goToStep(n) {
    state.step = n;
    $$('.view').forEach(v => v.classList.remove('is-active'));
    $(`#view-${n}`).classList.add('is-active');
    updateBreadcrumb(n);
    live.innerHTML = '';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  $$('.breadcrumb .crumb').forEach(btn => {
    btn.addEventListener('click', () => {
      const c = parseInt(btn.dataset.crumb, 10);
      if (!crumbReachable(c)) return;
      const target = crumbTargetView(c);
      if (target === 4 && state.lastSeats) {
        renderResult(state.lastSeats);
      }
      goToStep(target);
    });
  });

  $$('[data-back]').forEach(btn => {
    btn.addEventListener('click', () => {
      const target = parseInt(btn.dataset.back, 10);
      if (target === 1) {
        state.selectedJourney = null;
        state.trainStops = null;
        state.startIndex = state.endIndex = null;
      } else if (target === 2) {
        state.trainStops = null;
        state.startIndex = state.endIndex = null;
      }
      goToStep(target);
    });
  });

  // ===================== Loading / error helpers =====================
  function showLoading(title, hint) {
    live.setAttribute('aria-busy', 'true');
    live.innerHTML = '';
    const node = tplLoading.content.cloneNode(true);
    node.querySelector('[data-slot="title"]').textContent = title;
    const h = node.querySelector('[data-slot="hint"]');
    h.innerHTML = `${escapeHtml(hint)} <span class="pd text-rail-ink/60"><span></span><span></span><span></span></span>`;
    live.appendChild(node);
  }
  function clearLive() {
    live.setAttribute('aria-busy', 'false');
    live.innerHTML = '';
  }
  function showError(heading, message, hint = '') {
    clearLive();
    const node = tplError.content.cloneNode(true);
    if (heading) node.querySelector('[data-slot="heading"]').textContent = heading;
    node.querySelector('[data-slot="message"]').textContent = message;
    node.querySelector('[data-slot="hint"]').textContent = hint;
    live.appendChild(node);
  }

  // ===================== Station autocomplete =====================
  function makeCombo(root) {
    const input = root.querySelector('input[role="combobox"]');
    const list  = root.querySelector('ul.combo-list');
    let items = [];
    let activeIndex = -1;
    let debounceT = null;
    let token = 0;

    function open()  { root.setAttribute('aria-expanded', 'true'); input.setAttribute('aria-expanded','true'); }
    function close() { root.setAttribute('aria-expanded', 'false'); input.setAttribute('aria-expanded','false'); activeIndex = -1; }

    function render(stations, q) {
      list.innerHTML = '';
      items = [];
      if (!stations.length) {
        list.innerHTML = `<li class="combo-empty">No matches for “${escapeHtml(q)}”.</li>`;
        open(); return;
      }
      stations.forEach((s, i) => {
        const li = document.createElement('li');
        li.className = 'combo-item';
        li.setAttribute('role','option');
        li.innerHTML = `
          <svg width="14" height="14" viewBox="0 0 24 24" class="shrink-0 text-rail-ink/40" aria-hidden="true">
            <circle cx="12" cy="10" r="3" fill="none" stroke="currentColor" stroke-width="1.6"/>
            <path d="M12 2a8 8 0 0 1 8 8c0 6-8 12-8 12S4 16 4 10a8 8 0 0 1 8-8z" fill="none" stroke="currentColor" stroke-width="1.6"/>
          </svg>
          <span class="truncate">${highlight(s.name, q)}</span>
          <span class="tag">${escapeHtml(s.slug)}</span>`;
        li.addEventListener('mousedown', (e) => { e.preventDefault(); select(i); });
        list.appendChild(li);
        items.push({ el: li, station: s });
      });
      activeIndex = -1;
      open();
    }
    async function query(q) {
      const t = ++token;
      if (q.length < 2) { close(); return; }
      try {
        const res = await fetch(`/api/stations?q=${encodeURIComponent(q)}`);
        const data = await res.json();
        if (t !== token) return;
        render(data.stations || [], q);
      } catch { close(); }
    }
    function select(i) {
      if (i < 0 || i >= items.length) return;
      input.value = items[i].station.name;
      input.dataset.slug = items[i].station.slug;
      close();
    }
    function setActive(i) {
      if (activeIndex >= 0 && items[activeIndex]) items[activeIndex].el.setAttribute('aria-selected','false');
      activeIndex = Math.max(-1, Math.min(items.length-1, i));
      if (activeIndex >= 0) {
        items[activeIndex].el.setAttribute('aria-selected','true');
        items[activeIndex].el.scrollIntoView({ block: 'nearest' });
      }
    }
    input.addEventListener('input', () => {
      input.dataset.slug = '';
      clearTimeout(debounceT);
      debounceT = setTimeout(() => query(input.value.trim()), 180);
    });
    input.addEventListener('focus', () => {
      if (items.length) open();
      else if (input.value.trim().length >= 2) query(input.value.trim());
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowDown') { e.preventDefault(); setActive(activeIndex+1); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); setActive(activeIndex-1); }
      else if (e.key === 'Enter' && activeIndex >= 0) { e.preventDefault(); select(activeIndex); }
      else if (e.key === 'Escape') close();
    });
    document.addEventListener('click', (e) => { if (!root.contains(e.target)) close(); });
  }
  makeCombo($('[data-combo="from"]'));
  makeCombo($('[data-combo="to"]'));

  // Swap
  $('#swap').addEventListener('click', () => {
    const a = $('#from'), b = $('#to');
    [a.value, b.value] = [b.value, a.value];
    [a.dataset.slug, b.dataset.slug] = [b.dataset.slug || '', a.dataset.slug || ''];
  });

  // Defaults
  const now = new Date();
  const yyyy = now.getFullYear();
  const mm = String(now.getMonth()+1).padStart(2,'0');
  const dd = String(now.getDate()).padStart(2,'0');
  $('#date').value = `${yyyy}-${mm}-${dd}`;

  // ===================== STEP 1 → STEP 2: search journeys =====================
  $('#search-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fromV = $('#from').value.trim();
    const toV   = $('#to').value.trim();
    const dateV = $('#date').value;
    const timeV = $('#time').value;
    const numV  = $('#number').value.trim();

    if (!dateV) { showError('Missing date', 'Pick a departure date.'); return; }
    if (!fromV && !toV && !numV) {
      showError('Not enough info', 'Provide at least an origin, destination, or train number.');
      return;
    }

    state.date = dateV;
    // The start stop is always adjustable — users often board at a station
    // different from what's printed on the ticket (mid-route boarding, etc).
    // Only the destination is fixed when explicitly searched for.
    state.lockStart = false;
    state.lockEnd = Boolean(toV);
    showLoading('Searching trains…', 'Querying the PKP Intercity timetable');

    const params = new URLSearchParams();
    params.set('date', dateV);
    if (fromV) params.set('from', fromV);
    if (toV)   params.set('to', toV);
    if (timeV) params.set('time', timeV);
    if (numV)  params.set('number', numV);

    try {
      const res = await fetch(`/api/journeys?${params}`);
      const data = await res.json();
      clearLive();
      if (!res.ok || data.error) {
        showError('Search failed', data.error || 'Something went wrong.', 'Check station spelling — pick from the autocomplete.');
        return;
      }
      state.journeys = data.journeys || [];
      renderJourneyList();
      goToStep(2);
    } catch {
      clearLive();
      showError('Network error', "Couldn't reach the server. Is it running?");
    }
  });

  function renderJourneyList() {
    const wrap = $('#journey-list');
    wrap.innerHTML = '';
    $('#journey-count').textContent =
      state.journeys.length === 0
        ? 'no matches'
        : `${state.journeys.length} train${state.journeys.length === 1 ? '' : 's'}`;

    if (!state.journeys.length) {
      const empty = document.createElement('div');
      empty.className = 'rounded-3xl bg-rail-paper p-6 text-center ring-1 ring-rail-ink/5';
      empty.innerHTML = `
        <div class="label text-rail-ink/60">No results</div>
        <p class="mt-2 text-[14px]">Widen your criteria — try leaving "time" or "train number" empty.</p>`;
      wrap.appendChild(empty);
      return;
    }

    state.journeys.forEach((j, idx) => {
      const card = document.createElement('button');
      card.type = 'button';
      card.className = 'card w-full text-left rounded-3xl bg-rail-paper p-4 shadow-ticket ring-1 ring-rail-ink/5 hover:shadow-pick rise';
      card.style.animationDelay = `${idx * 40}ms`;
      const dur = j.duration_min ? durationLabel(j.duration_min) : '';
      card.innerHTML = `
        <div class="flex items-center gap-2 flex-wrap">
          <span class="rounded-md bg-rail-ink text-rail-cream text-[11px] font-black tracking-[.18em] px-2 py-1 mono">${escapeHtml(j.brand)}</span>
          <span class="mono num font-black text-[18px] leading-none">${escapeHtml(String(j.train_nr ?? ''))}</span>
          ${j.name ? `<span class="label text-rail-ink/55">„${escapeHtml(j.name)}”</span>` : ''}
          ${dur ? `<span class="ml-auto text-[12px] text-rail-ink/50 mono num">${dur}</span>` : ''}
        </div>
        <div class="mt-3 grid grid-cols-[auto_1fr_auto] items-center gap-3">
          <div class="text-right">
            <div class="mono num text-[18px] font-black leading-none">${escapeHtml(j.from.time || '—')}</div>
            <div class="mt-0.5 text-[12px] text-rail-ink/70 font-medium truncate max-w-[10rem]">${escapeHtml(j.from.name || '')}</div>
          </div>
          <div class="px-1"><div class="track"></div></div>
          <div>
            <div class="mono num text-[18px] font-black leading-none">${escapeHtml(j.to.time || '—')}</div>
            <div class="mt-0.5 text-[12px] text-rail-ink/70 font-medium truncate max-w-[10rem]">${escapeHtml(j.to.name || '')}</div>
          </div>
        </div>`;
      card.addEventListener('click', () => pickJourney(j));
      wrap.appendChild(card);
    });
  }

  // ===================== STEP 2 → STEP 3: load train stops =====================
  async function pickJourney(j) {
    state.selectedJourney = j;
    goToStep(3);
    $('#train-header').innerHTML = trainHeaderHtml(j);
    $('#stop-list').innerHTML = '';
    $('#leg-summary').classList.add('hidden');
    $('#go-seats').disabled = true;
    showLoading('Loading the train timetable…', 'All stops on the route');

    try {
      const res = await fetch(`/api/trains/${j.train_id}/stops?date=${encodeURIComponent(state.date)}`);
      const data = await res.json();
      clearLive();
      if (!res.ok || data.error) {
        showError("Couldn't load timetable", data.error || 'Something went wrong.');
        return;
      }
      state.trainStops = data;
      const fromId = j.from.id, toId = j.to.id;
      const stops = data.stops;
      let si = stops.findIndex(s => s.station_id === fromId);
      let ei = stops.findIndex(s => s.station_id === toId);
      if (si < 0) si = 0;
      if (ei <= si || ei < 0) ei = stops.length - 1;
      // Only show stops within the user's relation — hide everything
      // before the boarding stop or after the destination.
      state.displayRange = [si, ei];
      state.startIndex = si;
      state.endIndex = ei;
      state.lastSeats = null;
      updateBreadcrumb(3);
      renderStopPicker();
      updateSeatsButton();
    } catch {
      clearLive();
      showError('Network error', "Couldn't reach the server.");
    }
  }

  function trainHeaderHtml(j) {
    return `
      <section class="rounded-3xl bg-rail-ink text-rail-cream shadow-pop overflow-hidden">
        <div class="px-5 py-4 flex items-center gap-2 flex-wrap">
          <span class="rounded-md bg-rail-cream text-rail-ink text-[11px] font-black tracking-[.18em] px-2 py-1 mono">${escapeHtml(j.brand)}</span>
          <span class="mono num text-[16px] font-bold">${escapeHtml(String(j.train_nr ?? ''))}</span>
          ${j.name ? `<span class="label text-rail-cream/60">„${escapeHtml(j.name)}”</span>` : ''}
        </div>
      </section>`;
  }

  function renderStopPicker() {
    const stops = state.trainStops.stops;
    const [a, b] = state.displayRange || [0, stops.length - 1];
    // Update hint
    const hintEl = $('#picker-hint');
    if (state.lockStart && state.lockEnd) hintEl.textContent = 'Your relation';
    else if (state.lockEnd) hintEl.textContent = 'Tap to change your boarding stop (destination is locked)';
    else if (state.lockStart) hintEl.textContent = 'Tap to change your alighting stop (origin is locked)';
    else hintEl.textContent = 'Tap to pick start, then destination';
    const wrap = $('#stop-list');
    wrap.innerHTML = '';
    for (let i = a; i <= b; i++) {
      const s = stops[i];
      const row = document.createElement('div');
      const isEnd = i === state.endIndex;
      const isStart = i === state.startIndex;
      const isLocked =
        (isEnd && state.lockEnd) ||
        (isStart && state.lockStart) ||
        (state.lockEnd && state.lockStart);
      row.className = 'stop-row' + (isLocked ? ' is-locked' : '');
      if (isStart) row.classList.add('is-start');
      else if (isEnd) row.classList.add('is-end');
      else if (state.startIndex != null && state.endIndex != null
               && i > state.startIndex && i < state.endIndex) row.classList.add('is-between');
      row.innerHTML = `
        <span class="relative flex items-center h-full">
          <span class="line"></span>
          <span class="dot"></span>
        </span>
        <span class="min-w-0">
          <span class="name block truncate">${escapeHtml(s.station_name)}</span>
          ${i === state.startIndex ? '<span class="pill mr-1">start</span>' :
            i === state.endIndex ? '<span class="pill">end</span>' : ''}
        </span>
        <span class="times">
          ${i === state.startIndex ? escapeHtml(s.departure) :
            i === state.endIndex ? escapeHtml(s.arrival) :
            escapeHtml(s.arrival === s.departure ? s.arrival : s.arrival + '–' + s.departure)}
        </span>`;
      row.addEventListener('click', () => handleStopTap(i));
      wrap.appendChild(row);
    }
    updateLegSummary();
  }

  let pickState = 'start'; // 'start' | 'end' — only used when neither end is locked
  function handleStopTap(i) {
    const [a, b] = state.displayRange || [0, state.trainStops.stops.length - 1];
    i = Math.max(a, Math.min(b, i));

    if (state.lockEnd && !state.lockStart) {
      // Destination is fixed — every tap sets the starting point.
      if (state.endIndex != null && i >= state.endIndex) return;
      state.startIndex = i;
    } else if (state.lockStart && !state.lockEnd) {
      // Origin is fixed — every tap sets the destination.
      if (state.startIndex != null && i <= state.startIndex) return;
      state.endIndex = i;
    } else if (state.lockStart && state.lockEnd) {
      // Both locked — nothing to tap. Keep selection as-is.
      return;
    } else {
      // Neither locked: classic two-tap pick (start, then end).
      if (pickState === 'start' || i <= (state.startIndex ?? -1)) {
        state.startIndex = i;
        state.endIndex = null;
        pickState = 'end';
      } else {
        state.endIndex = i;
        pickState = 'start';
      }
    }
    renderStopPicker();
    updateSeatsButton();
  }

  function updateSeatsButton() {
    $('#go-seats').disabled = !(state.startIndex != null && state.endIndex != null);
  }

  function updateLegSummary() {
    const box = $('#leg-summary');
    if (state.startIndex == null || state.endIndex == null) {
      box.classList.add('hidden'); return;
    }
    const s = state.trainStops.stops[state.startIndex];
    const e = state.trainStops.stops[state.endIndex];
    box.classList.remove('hidden');
    box.innerHTML = `
      <div class="flex items-center justify-between gap-2">
        <div>
          <div class="label text-rail-moss">From</div>
          <div class="font-bold text-[15px]">${escapeHtml(s.station_name)}</div>
          <div class="mono num text-[12px] text-rail-ink/60">${escapeHtml(s.departure)}</div>
        </div>
        <svg width="24" height="16" viewBox="0 0 40 24" aria-hidden="true" class="text-rail-ink/40">
          <path d="M2 12h32M28 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
        <div class="text-right">
          <div class="label text-rail-rust">To</div>
          <div class="font-bold text-[15px]">${escapeHtml(e.station_name)}</div>
          <div class="mono num text-[12px] text-rail-ink/60">${escapeHtml(e.arrival)}</div>
        </div>
      </div>`;
  }

  // ===================== STEP 3 → STEP 4: fetch seats =====================
  $('#go-seats').addEventListener('click', async () => {
    if (state.startIndex == null || state.endIndex == null) return;
    const s = state.trainStops.stops[state.startIndex];
    const e = state.trainStops.stops[state.endIndex];
    goToStep(4);
    $('#seats-body').innerHTML = '';
    showLoading('Checking seat availability…', 'Takes 5–15 s — we query every segment');
    try {
      const res = await fetch('/api/seats', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({
          train_id: state.selectedJourney.train_id,
          from_station_id: s.station_id,
          to_station_id:   e.station_id,
          date: state.date,
        }),
      });
      const data = await res.json();
      clearLive();
      if (!res.ok || data.error) {
        showError("Couldn't find seats", data.error || 'Something went wrong.');
        return;
      }
      state.lastSeats = data;
      updateBreadcrumb(4);
      renderResult(data);
    } catch {
      clearLive();
      showError('Network error', "Couldn't reach the server.");
    }
  });

  function zoneClasses(ratio) {
    if (ratio >= 0.8) return { pillBg: 'bg-rail-moss/10', pillText: 'text-rail-moss', bar: 'bg-rail-moss' };
    if (ratio >= 0.4) return { pillBg: 'bg-rail-amber/15', pillText: 'text-[#8a5a10]', bar: 'bg-rail-amber' };
    return { pillBg: 'bg-rail-rust/10', pillText: 'text-rail-rust', bar: 'bg-rail-rust' };
  }
  function placementIcon(pid) {
    const base = 'inline-block align-middle';
    if (pid === 1) return `<svg class="${base}" width="14" height="14" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="3" fill="none" stroke="currentColor" stroke-width="1.8"/><line x1="12" y1="5" x2="12" y2="19" stroke="currentColor" stroke-width="1.8"/></svg>`;
    if (pid === 2) return `<svg class="${base}" width="14" height="14" viewBox="0 0 24 24" aria-hidden="true"><line x1="7" y1="4" x2="7" y2="20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="17" y1="4" x2="17" y2="20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-dasharray="2 3"/></svg>`;
    return `<svg class="${base}" width="14" height="14" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3.2" fill="currentColor"/><rect x="3" y="5" width="18" height="14" rx="3" fill="none" stroke="currentColor" stroke-width="1.4" opacity=".6"/></svg>`;
  }
  function specialIcon(kind) {
    const base = 'inline-block align-middle';
    if (kind === 'wheelchair') return `<svg class="${base}" width="13" height="13" viewBox="0 0 24 24" aria-hidden="true"><circle cx="10" cy="4" r="1.6" fill="currentColor"/><path d="M9 7l2 4h5l-1 3-4-.5-2 5H6l2.2-6.5L7 10V8l2-1z" fill="currentColor"/><circle cx="11.5" cy="17" r="4" fill="none" stroke="currentColor" stroke-width="1.4"/></svg>`;
    if (kind === 'quiet') return `<svg class="${base}" width="13" height="13" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 10v4h3l5 4V6L7 10H4z" fill="currentColor"/><path d="M16 8l4 4M20 8l-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" fill="none"/></svg>`;
    if (kind === 'bike') return `<svg class="${base}" width="13" height="13" viewBox="0 0 24 24" aria-hidden="true"><circle cx="6" cy="17" r="3.5" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="18" cy="17" r="3.5" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M6 17l4-7h6l2 7M10 10l3 7" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>`;
    return `<svg class="${base}" width="13" height="13" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M12 11v5M12 7.5h.01" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>`;
  }

  function renderResult(d) {
    const body = $('#seats-body');
    body.innerHTML = '';
    const total = d.train.total_duration_min || 1;

    // Train header
    const head = document.createElement('section');
    head.className = 'rounded-3xl bg-rail-ink text-rail-cream shadow-pop overflow-hidden rise';
    head.innerHTML = `
      <div class="px-5 pt-5 pb-4">
        <div class="flex items-center gap-2">
          <span class="rounded-md bg-rail-cream text-rail-ink text-[11px] font-black tracking-[.18em] px-2 py-1 mono">${escapeHtml(d.train.brand || '—')}</span>
          <span class="num mono text-[15px] font-bold tracking-wide">${escapeHtml(d.train.number)}</span>
          ${d.train.name ? `<span class="label text-rail-cream/60">„${escapeHtml(d.train.name)}”</span>` : ''}
          <span class="ml-auto num tab text-[12.5px] text-rail-cream/70">${durationLabel(total)}</span>
        </div>
        <div class="mt-4 grid grid-cols-[auto_1fr_auto] items-center gap-3">
          <div class="text-right">
            <div class="mono num text-[22px] font-black leading-none">${d.route.from.departure}</div>
            <div class="mt-1 text-[12px] text-rail-cream/80 font-medium max-w-[8rem] truncate">${escapeHtml(d.route.from.name)}</div>
          </div>
          <div class="px-1"><div class="track"></div></div>
          <div>
            <div class="mono num text-[22px] font-black leading-none">${d.route.to.arrival}</div>
            <div class="mt-1 text-[12px] text-rail-cream/80 font-medium max-w-[8rem] truncate">${escapeHtml(d.route.to.name)}</div>
          </div>
        </div>
      </div>
      <div class="relative h-3" aria-hidden="true">
        <div class="absolute inset-x-0 top-1/2 -translate-y-1/2 border-t border-dashed border-rail-cream/25"></div>
      </div>
      <div class="px-5 pb-5 pt-1 text-[12.5px] text-rail-cream/80">
        ${d.recommendations.length} seat${d.recommendations.length === 1 ? '' : 's'} · walk them in order.
      </div>`;
    body.appendChild(head);

    const legend = document.createElement('div');
    legend.className = 'mt-3 flex flex-wrap items-center gap-x-4 gap-y-1 px-1 text-[11.5px] text-rail-ink/60';
    legend.innerHTML = `
      <span class="flex items-center gap-1.5"><span class="inline-block w-2.5 h-2.5 rounded-full bg-rail-moss"></span>free ≥80%</span>
      <span class="flex items-center gap-1.5"><span class="inline-block w-2.5 h-2.5 rounded-full bg-rail-amber"></span>40–80%</span>
      <span class="flex items-center gap-1.5"><span class="inline-block w-2.5 h-2.5 rounded-full bg-rail-rust"></span>&lt;40%</span>`;
    body.appendChild(legend);

    if (!d.recommendations.length) {
      const empty = document.createElement('div');
      empty.className = 'mt-4 rounded-3xl bg-rail-paper p-6 text-center ring-1 ring-rail-ink/5';
      empty.innerHTML = `
        <div class="label text-rail-ink/60">No free seats</div>
        <p class="mt-2 text-[14px]">Every seat has a reservation on at least one segment. Board anyway — people with reservations sometimes no-show.</p>`;
      body.appendChild(empty);
      return;
    }

    const groups = [];
    for (const rec of d.recommendations) {
      const last = groups[groups.length - 1];
      if (last && last.carriage === rec.carriage) last.items.push(rec);
      else groups.push({ carriage: rec.carriage, items: [rec] });
    }

    let globalIndex = 0;
    const list = document.createElement('div');
    list.className = 'mt-3 space-y-5';
    for (const group of groups) {
      const section = document.createElement('section');
      section.className = 'relative rounded-3xl bg-rail-paper pl-5 pr-4 py-4 shadow-ticket ring-1 ring-rail-ink/5';
      section.innerHTML = `<div class="carriage-rail"></div>`;
      const header = document.createElement('div');
      header.className = 'mb-3 flex items-baseline justify-between';
      header.innerHTML = `
        <div class="flex items-baseline gap-2">
          <span class="label">Carriage</span>
          <span class="mono num font-black text-[20px] tracking-tight leading-none">${escapeHtml(group.carriage)}</span>
        </div>
        <span class="text-[11.5px] text-rail-ink/50">${group.items.length} seat${group.items.length === 1 ? '' : 's'}</span>`;
      section.appendChild(header);

      for (const rec of group.items) {
        globalIndex++;
        const isSoon = rec.status === 'free_soon';
        const ratio = Math.min(1, rec.free_minutes / total);
        const z = isSoon
          ? { pillBg: 'bg-rail-amber/20', pillText: 'text-[#8a5a10]', bar: 'bg-rail-amber' }
          : zoneClasses(ratio);
        const card = document.createElement('div');
        card.className = 'py-3 border-t border-rail-ink/10 first:border-t-0 first:pt-0 rise' + (isSoon ? ' seat-soon' : '');
        card.style.animationDelay = `${globalIndex * 40}ms`;
        const specialBadge = rec.special_label
          ? `<span class="inline-flex items-center gap-1 rounded-full px-2 py-0.5 text-[10.5px] font-semibold bg-rail-ink/5 text-rail-ink/70" title="${escapeHtml(rec.special_label)}">
               ${specialIcon(rec.special_icon)}
               <span class="truncate max-w-[9rem]">${escapeHtml(rec.special_label)}</span>
             </span>` : '';
        const soonBadge = isSoon
          ? `<span class="inline-flex items-center gap-1 rounded-full px-2 py-0.5 text-[10px] font-black tracking-[.12em] uppercase bg-rail-amber text-white" title="Opens up within 1–2 stops">
               <svg width="11" height="11" viewBox="0 0 24 24" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M12 7v5l3 2M12 3a9 9 0 1 1 0 18 9 9 0 0 1 0-18z"/></svg>
               soon
             </span>` : '';
        const availLine = isSoon && rec.available_from_station
          ? `<div class="mt-1 text-[12px] text-[#8a5a10] font-semibold">
               opens at <span class="text-rail-ink/80">${escapeHtml(rec.available_from_station)}</span>
               ${rec.available_from_minutes != null ? `<span class="text-rail-ink/50 font-normal"> · wait ${durationLabel(rec.available_from_minutes)}</span>` : ''}
             </div>` : '';
        card.innerHTML = `
          <div class="flex items-start gap-3">
            <span class="step mt-0.5 ${isSoon ? '!bg-rail-amber !text-rail-ink' : ''}">${globalIndex}</span>
            <div class="min-w-0 flex-1">
              <div class="flex items-baseline flex-wrap gap-x-2 gap-y-1">
                <span class="mono num font-black text-[22px] leading-none tracking-tight">seat ${escapeHtml(rec.seat)}</span>
                <span class="inline-flex items-center gap-1 text-[12px] font-semibold text-rail-line">
                  ${placementIcon(rec.placement_id)}
                  <span>${escapeHtml(rec.placement)}</span>
                </span>
                ${soonBadge}
                ${specialBadge}
              </div>
              ${availLine}
              <div class="mt-2 flex items-center flex-wrap gap-2">
                <span class="inline-flex items-center gap-1.5 rounded-full px-2.5 py-1 text-[11.5px] font-bold ${z.pillBg} ${z.pillText}">
                  <span class="mono num">${durationLabel(rec.free_minutes)}</span>
                  <span class="font-medium opacity-80">${isSoon ? 'once open' : 'free'}</span>
                </span>
                ${rec.free_until_station
                  ? `<span class="text-[12px] text-rail-ink/60 truncate">until <span class="font-semibold text-rail-ink/80">${escapeHtml(rec.free_until_station)}</span></span>`
                  : `<span class="text-[12px] text-rail-moss font-semibold">${isSoon ? 'rest of the trip' : 'whole journey'}</span>`}
              </div>
              <div class="mt-2 bar-track h-1.5">
                <div class="bar-fill ${z.bar}" style="width: ${Math.round(ratio * 100)}%"></div>
              </div>
            </div>
          </div>`;
        section.appendChild(card);
      }
      list.appendChild(section);
    }
    body.appendChild(list);

    const foot = document.createElement('p');
    foot.className = 'px-1 pt-2 text-[11.5px] text-rail-ink/50 leading-snug';
    foot.textContent = 'Walk them in order. "Free" means "no reservation on file" — glance inside each carriage for the physically empty ones.';
    body.appendChild(foot);
  }
})();
</script>
</body>
</html>
